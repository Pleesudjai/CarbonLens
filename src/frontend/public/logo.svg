<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Outer lens circle -->
  <circle cx="240" cy="240" r="200" stroke="#059669" stroke-width="30" fill="none"/>
  <!-- Lens handle -->
  <line x1="385" y1="385" x2="480" y2="480" stroke="#059669" stroke-width="34" stroke-linecap="round"/>
  <!-- CO2 molecule: central C atom -->
  <circle cx="240" cy="240" r="36" fill="#059669"/>
  <text x="240" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#ffffff">C</text>
  <!-- Left O atom -->
  <circle cx="140" cy="240" r="30" fill="#059669" opacity="0.7"/>
  <text x="140" y="251" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="bold" fill="#ffffff">O</text>
  <!-- Right O atom -->
  <circle cx="340" cy="240" r="30" fill="#059669" opacity="0.7"/>
  <text x="340" y="251" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="bold" fill="#ffffff">O</text>
  <!-- Double bonds left -->
  <line x1="170" y1="230" x2="204" y2="230" stroke="#059669" stroke-width="5" stroke-linecap="round"/>
  <line x1="170" y1="250" x2="204" y2="250" stroke="#059669" stroke-width="5" stroke-linecap="round"/>
  <!-- Double bonds right -->
  <line x1="276" y1="230" x2="310" y2="230" stroke="#059669" stroke-width="5" stroke-linecap="round"/>
  <line x1="276" y1="250" x2="310" y2="250" stroke="#059669" stroke-width="5" stroke-linecap="round"/>
  <!-- Small subscript 2 -->
  <text x="370" y="275" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#059669" opacity="0.8">2</text>
</svg>
